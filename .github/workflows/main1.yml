name: Скачивать и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Сбор всех источников (без проверки)
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          # 1. Обработка обычных ссылок из sources.txt
          if [ -f sources.txt ]; then
            echo "Обработка источников из sources.txt..."
            while IFS= read -r url || [ -n "$url" ]; do
              [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
              url=$(echo "$url" | xargs)
              filename="raw_$(date +%s%N).tmp"
              if curl -L -f -s -o "./downloads/$filename" "$url"; then
                grep -v '^[[:space:]]*#' "./downloads/$filename" | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "Добавлено из URL: $url"
              fi
            done < sources.txt
          fi

          # 2. Добавление ключей из локального файла VPN-Vless.txt
          if [ -f VPN-Vless.txt ]; then
            echo "Добавление ключей из VPN-Vless.txt..."
            grep -v '^[[:space:]]*#' VPN-Vless.txt | sed '/^$/d' >> mobile-whitelist-1.txt
            echo "Локальные ключи добавлены."
          fi

          # 3. Декодирование Base64 ссылок из Base64.txt
          if [ -f Base64.txt ]; then
            echo "Обработка Base64 источников..."
            while IFS= read -r b64_url || [ -n "$b64_url" ]; do
              [[ -z "$b64_url" || "$b64_url" =~ ^[[:space:]]*# ]] && continue
              b64_url=$(echo "$b64_url" | xargs)
              b64_tmp="b64_$(date +%s%N).tmp"
              if curl -L -f -s --user-agent "Mozilla/5.0" -o "./downloads/$b64_tmp" "$b64_url"; then
                base64 --decode "./downloads/$b64_tmp" 2>/dev/null | grep -v '^[[:space:]]*#' | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "Base64 декодирован: $b64_url"
              fi
            done < Base64.txt
          fi

          # Чистка: удаляем пустые строки и дубликаты
          sed -i '/^$/d' mobile-whitelist-1.txt
          sort -u -o mobile-whitelist-1.txt mobile-whitelist-1.txt

      - name: Отправка на GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo
          
          cp -f mobile-whitelist-1.txt ./repo/mobile-whitelist-1.txt
          echo "# Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> ./repo/mobile-whitelist-1.txt

          cd ./repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"
          
          git add mobile-whitelist-1.txt
          
          if git commit -m "auto update whitelist $(date -u +'%Y-%m-%d %H:%M:%S UTC')"; then
            git push
            echo "✅ Файл успешно обновлен на GitVerse"
          else
            echo "Изменений не найдено"
          fi
