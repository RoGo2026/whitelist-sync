name: Скачивать, проверять и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Сбор всех источников
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          echo "Шаг 1: Извлечение ключей из accargame (Логика PowerShell)..."
          # Максимальная имитация браузера для обхода 403/пустой страницы
          ACCAR_HTML=$(curl -sL --max-time 30 \
            -H "Authority: accargame.cfd" \
            -H "Upgrade-Insecure-Requests: 1" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8" \
            -H "Sec-Fetch-Site: none" \
            -H "Sec-Fetch-Mode: navigate" \
            -H "Sec-Fetch-User: ?1" \
            -H "Sec-Fetch-Dest: document" \
            -H "Accept-Language: ru-RU,ru;q=0.9,en-US;q=0.8,en;q=0.7" \
            "https://accargame.cfd/sub/opn-OowpWVHaChrr" || echo "")

          if [ -z "$ACCAR_HTML" ] || [ ${#ACCAR_HTML} -lt 200 ]; then
            echo "Критическая ошибка: Сайт заблокировал запрос от GitHub (пустой ответ)."
          else
            python3 -c "
          import re, base64, sys
          html = sys.stdin.read()
          # Регулярка из твоего PS1: поиск Base64 блоков
          matches = re.findall(r'[A-Za-z0-9+/=]{50,}', html)
          if matches:
              # Твоя логика: берем самый длинный блок
              longest = max(matches, key=len)
              try:
                  missing_padding = len(longest) % 4
                  if missing_padding: longest += '=' * (4 - missing_padding)
                  decoded = base64.b64decode(longest).decode('utf-8', errors='ignore')
                  if 'vless://' in decoded:
                      print(decoded.strip())
              except: pass
          " <<< "$ACCAR_HTML" >> mobile-whitelist-1.txt
          fi

          echo "Шаг 2: Обработка источников из sources.txt..."
          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
            url=$(echo "$url" | xargs)
            filename=$(basename "$url" | sed 's/[^a-zA-Z0-9._-]/-/g')
            if curl -L -f --fail-early --max-time 20 -H "User-Agent: Mozilla/5.0" -o "./downloads/$filename" "$url"; then
              grep -v '^[[:space:]]*#' "./downloads/$filename" | sed '/^$/d' >> mobile-whitelist-1.txt
              echo "Добавлено: $url"
            fi
          done < sources.txt

      - name: Загрузить результат как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: raw-whitelist
          path: mobile-whitelist-1.txt

  check-and-deploy:
    needs: collect-sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Скачать собранный файл
        uses: actions/download-artifact@v4
        with:
          name: raw-whitelist

      - name: Скачать и установить Xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/

      - name: Запустить проверку ссылок (check_links.py)
        run: python3 check_links.py

      - name: Обновить файл на GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo
          if [ -f working_whitelist.txt ]; then
            cp -f working_whitelist.txt ./repo/mobile-whitelist-1.txt
          else
            cp -f mobile-whitelist-1.txt ./repo/mobile-whitelist-1.txt
          fi
          echo "# Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> ./repo/mobile-whitelist-1.txt
          cd ./repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"
          git add mobile-whitelist-1.txt
          git commit -m "auto update $(date -u +'%Y-%m-%d %H:%M:%S UTC') [skip ci]" || echo "No changes"
          git push
