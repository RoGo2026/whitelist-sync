name: Скачивать, проверять и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Скачать источники и создать чистый mobile-whitelist-1.txt
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          if [ ! -f sources.txt ]; then
            echo "Ошибка: файл sources.txt не найден в корне репозитория!" >&2
            exit 1
          fi

          # =============================================================================
          # ФУНКЦИЯ: Универсальная обработка ссылок (Base64 и прямые списки)
          # Логика: Сначала пробуем как есть (для старых ссылок), если HTML — меняем UA.
          # =============================================================================
          process_link() {
            local url="$1"
            local output_file="$2"
            local temp_raw="./downloads/temp_raw_$$"
            local decoded_tmp="./downloads/decoded_tmp_$$"

            # --- ШАГ 1: Стандартное скачивание (чтобы не ломать mifa.world и др.) ---
            curl -L -f --fail-early -s -o "$temp_raw" "$url"
            local status=$?

            local is_html=false
            # Если скачалось с ошибкой ИЛИ внутри есть HTML теги
            if [ $status -ne 0 ] || grep -qE '<!DOCTYPE|<html|<body|<div' "$temp_raw" 2>/dev/null; then
              is_html=true
            fi

            # --- ШАГ 2: Если HTML или ошибка — пробуем "Умные" заголовки ---
            if [ "$is_html" = true ]; then
              echo "   Стандартный запрос вернул ошибку или HTML. Пробуем v2ray заголовки..."
              rm -f "$temp_raw" # Удаляем мусорный файл

              # Попытка с заголовками v2rayN
              if ! curl -L -f --fail-early -s \
                 -H "User-Agent: v2rayN/6.42" \
                 -H "Accept: text/plain, */*" \
                 -H "Profile-Update: 1" \
                 -o "$temp_raw" "$url"; then
                 
                 # Попытка с заголовками Clash (запасной вариант)
                 if ! curl -L -f --fail-early -s \
                    -H "User-Agent: ClashMetaForAndroid/2.10.3" \
                    -H "Accept: text/plain" \
                    -o "$temp_raw" "$url"; then
                    echo "❌ Не удалось скачать даже с v2ray заголовками: $url"
                    rm -f "$temp_raw"
                    return 1
                 fi
              fi
            fi

            # Читаем содержимое, удаляем лишние пробелы и переносы
            local content
            content=$(cat "$temp_raw" | tr -d '\r\n\t' | xargs)
            
            if [ -z "$content" ]; then
              echo "⚠ Файл пустой: $url"
              rm -f "$temp_raw"
              return 1
            fi

            # --- ШАГ 3: Декодирование или сохранение ---
            
            # Вариант А: Это Base64 (длинная строка из букв/цифр)
            if [[ "$content" =~ ^[A-Za-z0-9+/=_-]{20,}$ ]]; then
              # 1. Пробуем стандартный base64
              if echo "$content" | base64 -d > "$decoded_tmp" 2>/dev/null && [ -s "$decoded_tmp" ]; then
                mv "$decoded_tmp" "$output_file"
                echo "  ✅ Декодировано (Standard Base64)"
                rm -f "$temp_raw"
                return 0
              fi
              
              # 2. Пробуем URL-Safe Base64 (замена символов - и _ на + и /)
              local fixed_b64
              fixed_b64=$(echo "$content" | tr '_-' '/+' | tr -cd 'A-Za-z0-9+/=' | \
                awk '{ len=length($0)%4; if(len==2)print $0"=="; else if(len==3)print $0"="; else print $0; }')
              
              if echo "$fixed_b64" | base64 -d > "$decoded_tmp" 2>/dev/null && [ -s "$decoded_tmp" ]; then
                mv "$decoded_tmp" "$output_file"
                echo "  ✅ Декодировано (URL-Safe Base64)"
                rm -f "$temp_raw"
                return 0
              fi
            fi

            # Вариант Б: Это готовый список ссылок (vmess://, vless://...)
            if [[ "$content" =~ (vmess|vless|trojan|ss|ssr|hysteria|tuic):// ]]; then
              echo "$content" | tr ' ' '\n' | grep -v '^$' > "$output_file"
              echo "  ✅ Сохранено как список ссылок"
              rm -f "$temp_raw"
              return 0
            fi

            # Если ничего не подошло
            echo "⚠ Не удалось распознать формат контента: $url"
            rm -f "$temp_raw" "$decoded_tmp"
            return 1
          }
          # =============================================================================

          echo "🔄 Обработка обычных источников из sources.txt..."
          while IFS= read -r url || [ -n "$url" ]; do
            if [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]]; then
              continue
            fi
            url=$(echo "$url" | xargs)
            if [[ -n "$url" ]]; then
              filename=$(basename "$url")
              # Для sources.txt оставляем старую логику (просто скачиваем и добавляем)
              if curl -L -f --fail-early -o "./downloads/$filename" "$url"; then
                grep -v '^[[:space:]]*#' "./downloads/$filename" | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "✅ Добавлено: $url"
              else
                echo "❌ Ошибка скачивания: $url" >&2
              fi
            fi
          done < sources.txt

          echo "🔄 Обработка источников из Base64.txt..."
          if [ ! -f Base64.txt ]; then
            echo "ℹ️ Файл Base64.txt не найден, пропускаем."
          else
            while IFS= read -r base64_url || [ -n "$base64_url" ]; do
              [[ -z "$base64_url" || "$base64_url" =~ ^[[:space:]]*# ]] && continue
              base64_url=$(echo "$base64_url" | xargs)
              [[ -z "$base64_url" ]] && continue
              
              echo "📥 Обработка: $base64_url"
              
              temp_decoded="./downloads/decoded_$$"
              
              # Вызываем нашу универсальную функцию
              if process_link "$base64_url" "$temp_decoded"; then
                grep -v '^[[:space:]]*#' "$temp_decoded" 2>/dev/null | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "✅ Успешно обработано: $base64_url"
              else
                echo " Пропущено: $base64_url" >&2
              fi
              
              rm -f "$temp_decoded"
            done < Base64.txt
          fi

          # Финальная очистка дубликатов и пустых строк
          sed -i '/^$/d' mobile-whitelist-1.txt
          # (Опционально) Сортировка и удаление дублей: sort -u -o mobile-whitelist-1.txt mobile-whitelist-1.txt

      - name: Сохранить собранный файл для проверки
        uses: actions/upload-artifact@v4
        with:
          name: raw-whitelist
          path: mobile-whitelist-1.txt

  test-and-filter:
    needs: collect-sources
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать собранный файл
        uses: actions/download-artifact@v4
        with:
          name: raw-whitelist

      - name: Скачать и установить Xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/
          echo "Xray-core установлен: $(xray version | head -n 1)"

      - name: Запустить проверку ссылок через Xray-core
        run: python3 check_links.py

      - name: Обновить файл на GitVerse (только рабочие ссылки)
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo

          if [ -f working_whitelist.txt ]; then
            cp -f working_whitelist.txt ./repo/mobile-whitelist-1.txt
          else
            cp -f mobile-whitelist-1.txt ./repo/mobile-whitelist-1.txt
          fi

          echo "# Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> ./repo/mobile-whitelist-1.txt

          cd ./repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"

          git add mobile-whitelist-1.txt

          if git commit -m "auto update checked whitelist $(date -u +'%Y-%m-%d %H:%M:%S UTC')"; then
            git push
            echo "✅ Файл с проверенными ссылками успешно отправлен на GitVerse"
          else
            echo "ℹ️ Нет изменений после проверки"
          fi
