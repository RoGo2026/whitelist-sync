name: Скачивать, проверять и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and build whitelist
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          if [ ! -f sources.txt ]; then
            echo "sources.txt not found" >&2
            exit 1
          fi

          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
            url=$(echo "$url" | xargs)

            filename=$(basename "$url")
            file="./downloads/$filename"

            success=0

            for ua in "Clash" "sing-box" "Mozilla/5.0"; do
              if curl -L -f --fail-early -H "User-Agent: $ua" -o "$file" "$url"; then
                success=1
                break
              fi
            done

            if [ $success -eq 0 ]; then
              echo "Download failed: $url" >&2
              continue
            fi

            raw=$(cat "$file" | tr -d '\r\n ')

            decoded=$(echo "$raw" | base64 -d 2>/dev/null || true)

            if [ -n "$decoded" ]; then
              echo "$decoded" | grep -E '^(vless|vmess|trojan)://' >> mobile-whitelist-1.txt || true
            else
              echo "$raw" | grep -E '^(vless|vmess|trojan)://' >> mobile-whitelist-1.txt || true
            fi

          done < sources.txt

      - name: Base64 sources
        run: |
          if [ ! -f Base64.txt ]; then
            echo "No Base64.txt, skipping"
            exit 0
          fi

          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
            url=$(echo "$url" | xargs)

            file="./downloads/b64_$(date +%s%N)_$RANDOM.tmp"

            success=0

            for ua in "Clash" "sing-box" "Mozilla/5.0"; do
              if curl -L -f --fail-early -H "User-Agent: $ua" -o "$file" "$url"; then
                success=1
                break
              fi
            done

            if [ $success -eq 0 ]; then
              echo "Base64 download failed: $url" >&2
              continue
            fi

            raw=$(cat "$file" | tr -d '\r\n ')

            decoded=$(echo "$raw" | base64 -d 2>/dev/null || true)

            if [ -n "$decoded" ]; then
              echo "$decoded" | grep -E '^(vless|vmess|trojan)://' >> mobile-whitelist-1.txt || true
            else
              echo "$raw" | grep -E '^(vless|vmess|trojan)://' >> mobile-whitelist-1.txt || true
            fi

            rm -f "$file"

          done < Base64.txt

      - name: Clean file
        run: |
          sed -i '/^$/d' mobile-whitelist-1.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitelist
          path: mobile-whitelist-1.txt

  push-to-gitverse:
    needs: collect-sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: whitelist

      - name: Build working list
        run: |
          grep -E '^(vless|vmess|trojan)://' mobile-whitelist-1.txt > working_whitelist.txt || true

      - name: Push to GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git repo

          cp working_whitelist.txt repo/mobile-whitelist-1.txt || cp mobile-whitelist-1.txt repo/mobile-whitelist-1.txt

          echo "# Updated: $(date -u)" >> repo/mobile-whitelist-1.txt

          cd repo
          git config user.name "GitHub Action Bot"
          git config user.email "bot@noreply.com"

          git add mobile-whitelist-1.txt

          git commit -m "auto update $(date -u)" || exit 0
          git push || exit 0
