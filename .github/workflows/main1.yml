name: Скачивать и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Сбор всех ссылок (без проверки)
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          # 1. Сбор из обычного списка sources.txt
          if [ -f sources.txt ]; then
            echo "Чтение источников из sources.txt..."
            while IFS= read -r url || [ -n "$url" ]; do
              [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
              url=$(echo "$url" | xargs)
              tmp_file="src_$(date +%s%N).tmp"
              if curl -L -f -s -o "./downloads/$tmp_file" "$url"; then
                grep -v '^[[:space:]]*#' "./downloads/$tmp_file" | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "Загружено: $url"
              fi
            done < sources.txt
          fi

          # 2. Сбор из Base64 источников
          if [ -f Base64.txt ]; then
            echo "Чтение Base64 из Base64.txt..."
            while IFS= read -r b64_url || [ -n "$b64_url" ]; do
              [[ -z "$b64_url" || "$b64_url" =~ ^[[:space:]]*# ]] && continue
              b64_url=$(echo "$b64_url" | xargs)
              tmp_b64="b64_$(date +%s%N).tmp"
              if curl -L -f -s --user-agent "Mozilla/5.0" -o "./downloads/$tmp_b64" "$b64_url"; then
                base64 --decode "./downloads/$tmp_b64" 2>/dev/null | grep -v '^[[:space:]]*#' | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "Декодировано: $b64_url"
              fi
            done < Base64.txt
          fi

          # Очистка от пустых строк и (опционально) дубликатов
          sed -i '/^$/d' mobile-whitelist-1.txt
          sort -u -o mobile-whitelist-1.txt mobile-whitelist-1.txt
          echo "Файл собран. Всего строк: $(wc -l < mobile-whitelist-1.txt)"

      - name: Синхронизация с GitVerse
        run: |
          # Клонируем целевой репозиторий
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./target_repo
          
          # Копируем файл
          cp -f mobile-whitelist-1.txt ./target_repo/mobile-whitelist-1.txt
          
          # Добавляем метку времени обновления прямо в файл
          echo "# Updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> ./target_repo/mobile-whitelist-1.txt

          cd ./target_repo
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          git add mobile-whitelist-1.txt
          
          if git commit -m "update whitelist $(date -u +'%Y-%m-%d %H:%M:%S UTC')"; then
            git push
            echo "✅ Данные отправлены на GitVerse"
          else
            echo "Изменений нет, пушить нечего."
          fi
