name: Скачивать, проверять и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Скачать источники и создать чистый mobile-whitelist-1.txt
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          if [ ! -f sources.txt ]; then
            echo "Ошибка: файл sources.txt не найден в корне репозитория!" >&2
            exit 1
          fi

          # =============================================================================
          # ФУНКЦИЯ: Универсальная обработка ссылок
          # =============================================================================
          process_link() {
            local url="$1"
            local output_file="$2"
            local temp_raw="./downloads/temp_raw_$$"
            local cookie_jar="./downloads/cookies_$$"
            local decoded_tmp="./downloads/decoded_tmp_$$"

            # --- ШАГ 1: Стандартное скачивание ---
            curl -L -f --fail-early -s -o "$temp_raw" "$url" 2>/dev/null
            local status=$?

            local need_retry=false
            if [ $status -ne 0 ] || [ ! -s "$temp_raw" ]; then
              need_retry=true
            elif grep -qE '<!DOCTYPE|<html|<body' "$temp_raw" 2>/dev/null; then
              need_retry=true
            fi

            # --- ШАГ 2: Если ошибка/HTML — пробуем с заголовками v2ray ---
            if [ "$need_retry" = true ]; then
              echo "   Стандартный запрос не удался. Пробуем v2ray заголовки..."
              rm -f "$temp_raw"

              if ! curl -L -f --fail-early -s \
                 -H "User-Agent: v2rayN/6.42" \
                 -H "Accept: text/plain, */*" \
                 -H "Profile-Update: 1" \
                 -o "$temp_raw" "$url" 2>/dev/null; then
                 
                 echo "   v2ray заголовки не помогли. Пробуем браузер + cookie..."
                 rm -f "$temp_raw"
                 
                 # Сначала получаем cookie с главной страницы
                 local domain=$(echo "$url" | sed -E 's|https?://([^/]+).*|\1|')
                 local main_url="https://$domain"
                 
                 curl -s -L -c "$cookie_jar" "$main_url" >/dev/null 2>&1 || true
                 
                 # Теперь запрашиваем подписку с cookie и заголовками браузера
                 if ! curl -L -f --fail-early -s \
                    -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                    -H "Accept: text/plain,application/octet-stream,*/*" \
                    -H "Accept-Language: en-US,en;q=0.9" \
                    -H "Accept-Encoding: gzip, deflate, br" \
                    -H "Connection: keep-alive" \
                    -H "Sec-Fetch-Dest: empty" \
                    -H "Sec-Fetch-Mode: cors" \
                    -H "Sec-Fetch-Site: same-origin" \
                    -b "$cookie_jar" \
                    --compressed \
                    -o "$temp_raw" "$url" 2>/dev/null; then
                    echo "❌ Не удалось скачать с браузерными заголовками"
                    rm -f "$temp_raw" "$cookie_jar"
                    return 1
                 fi
              fi
            fi

            # Проверяем результат
            if [ ! -s "$temp_raw" ]; then
              echo "⚠ Пустой файл"
              rm -f "$temp_raw" "$cookie_jar"
              return 1
            fi

            # Проверяем, не HTML ли это
            if grep -qE '<!DOCTYPE|<html|<body' "$temp_raw" 2>/dev/null; then
              echo "⚠ Сервер вернул HTML вместо данных"
              rm -f "$temp_raw" "$cookie_jar"
              return 1
            fi

            # Читаем содержимое
            local content
            content=$(cat "$temp_raw" | tr -d '\r\n\t' | xargs)
            
            if [ -z "$content" ]; then
              echo "⚠ Пустой контент"
              rm -f "$temp_raw" "$cookie_jar"
              return 1
            fi

            # --- ШАГ 3: Декодирование ---
            if [[ "$content" =~ ^[A-Za-z0-9+/=_-]{20,}$ ]]; then
              # Стандартный Base64
              if echo "$content" | base64 -d > "$decoded_tmp" 2>/dev/null && [ -s "$decoded_tmp" ]; then
                mv "$decoded_tmp" "$output_file"
                echo "  ✅ Декодировано (Standard Base64)"
                rm -f "$temp_raw" "$cookie_jar"
                return 0
              fi
              
              # URL-Safe Base64
              local fixed_b64
              fixed_b64=$(echo "$content" | tr '_-' '/+' | tr -cd 'A-Za-z0-9+/=' | \
                awk '{ len=length($0)%4; if(len==2)print $0"=="; else if(len==3)print $0"="; else print $0; }')
              
              if echo "$fixed_b64" | base64 -d > "$decoded_tmp" 2>/dev/null && [ -s "$decoded_tmp" ]; then
                mv "$decoded_tmp" "$output_file"
                echo "  ✅ Декодировано (URL-Safe Base64)"
                rm -f "$temp_raw" "$cookie_jar"
                return 0
              fi
            fi

            # Готовый список ссылок
            if [[ "$content" =~ (vmess|vless|trojan|ss|ssr|hysteria|tuic):// ]]; then
              echo "$content" | tr ' ' '\n' | grep -v '^$' > "$output_file"
              echo "  ✅ Сохранено как список ссылок"
              rm -f "$temp_raw" "$cookie_jar"
              return 0
            fi

            echo "⚠ Не распознан формат"
            rm -f "$temp_raw" "$cookie_jar" "$decoded_tmp"
            return 1
          }
          # =============================================================================

          echo "🔄 Обработка sources.txt..."
          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
            url=$(echo "$url" | xargs)
            [[ -z "$url" ]] && continue
            
            filename=$(basename "$url")
            if curl -L -f --fail-early -o "./downloads/$filename" "$url" 2>/dev/null; then
              grep -v '^[[:space:]]*#' "./downloads/$filename" | sed '/^$/d' >> mobile-whitelist-1.txt
              echo "✅ Добавлено: $url"
            else
              echo "❌ Ошибка: $url" >&2
            fi
          done < sources.txt

          echo "🔄 Обработка Base64.txt..."
          if [ ! -f Base64.txt ]; then
            echo "ℹ️ Base64.txt не найден"
          else
            while IFS= read -r base64_url || [ -n "$base64_url" ]; do
              [[ -z "$base64_url" || "$base64_url" =~ ^[[:space:]]*# ]] && continue
              base64_url=$(echo "$base64_url" | xargs)
              [[ -z "$base64_url" ]] && continue
              
              echo "📥 Обработка: $base64_url"
              temp_decoded="./downloads/decoded_$$"
              
              if process_link "$base64_url" "$temp_decoded"; then
                grep -v '^[[:space:]]*#' "$temp_decoded" 2>/dev/null | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "✅ Успешно: $base64_url"
              else
                echo "❌ Пропущено: $base64_url" >&2
              fi
              
              rm -f "$temp_decoded"
            done < Base64.txt
          fi

          sed -i '/^$/d' mobile-whitelist-1.txt

      - name: Сохранить собранный файл
        uses: actions/upload-artifact@v4
        with:
          name: raw-whitelist
          path: mobile-whitelist-1.txt

  test-and-filter:
    needs: collect-sources
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать собранный файл
        uses: actions/download-artifact@v4
        with:
          name: raw-whitelist

      - name: Скачать и установить Xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/
          echo "Xray-core установлен: $(xray version | head -n 1)"

      - name: Запустить проверку ссылок
        run: python3 check_links.py

      - name: Обновить файл на GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo

          if [ -f working_whitelist.txt ]; then
            cp -f working_whitelist.txt ./repo/mobile-whitelist-1.txt
          else
            cp -f mobile-whitelist-1.txt ./repo/mobile-whitelist-1.txt
          fi

          echo "# Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> ./repo/mobile-whitelist-1.txt

          cd ./repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"

          git add mobile-whitelist-1.txt

          if git commit -m "auto update checked whitelist $(date -u +'%Y-%m-%d %H:%M:%S UTC')"; then
            git push
            echo "✅ Файл отправлен на GitVerse"
          else
            echo "ℹ️ Нет изменений"
          fi
