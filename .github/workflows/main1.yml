name: Скачивать, проверять и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Скачать источники и создать whitelist
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          if [ ! -f sources.txt ]; then
            echo "sources.txt не найден" >&2
            exit 1
          fi

          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
            url=$(echo "$url" | xargs)

            filename=$(basename "$url")
            file="./downloads/$filename"

            success=0

            # 🔥 MULTI USER-AGENT FIX
            for ua in "Clash" "sing-box" "Mozilla/5.0"; do
              echo "Пробуем UA: $ua"

              if curl -L -f --fail-early -H "User-Agent: $ua" -o "$file" "$url"; then
                success=1
                echo "OK: $ua"
                break
              fi
            done

            if [ $success -eq 0 ]; then
              echo "Ошибка: $url" >&2
              continue
            fi

            # 🔥 очистка входных данных
            raw=$(cat "$file" | tr -d '\r\n ')

            # 🔥 пробуем base64 decode
            decoded=$(echo "$raw" | base64 -d 2>/dev/null)

            if [[ -n "$decoded" ]]; then
              echo "$decoded" >> mobile-whitelist-1.txt
            else
              echo "$raw" >> mobile-whitelist-1.txt
            fi

          done < sources.txt

      - name: Base64 sources (если есть)
        run: |
          if [ ! -f Base64.txt ]; then
            echo "Base64.txt нет — пропуск"
            exit 0
          fi

          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
            url=$(echo "$url" | xargs)

            file="./downloads/b64_$(date +%s%N)_$RANDOM.tmp"

            success=0

            for ua in "Clash" "sing-box" "Mozilla/5.0"; do
              if curl -L -f --fail-early -H "User-Agent: $ua" -o "$file" "$url"; then
                success=1
                break
              fi
            done

            if [ $success -eq 0 ]; then
              echo "Base64 ошибка: $url" >&2
              continue
            fi

            raw=$(cat "$file" | tr -d '\r\n ')
            decoded=$(echo "$raw" | base64 -d 2>/dev/null)

            if [[ -n "$decoded" ]]; then
              echo "$decoded" >> mobile-whitelist-1.txt
            else
              echo "$raw" >> mobile-whitelist-1.txt
            fi

            rm -f "$file"

          done < Base64.txt

      - name: Очистка файла
        run: |
          sed -i '/^$/d' mobile-whitelist-1.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitelist
          path: mobile-whitelist-1.txt

  test-and-filter:
    needs: collect-sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: whitelist

      - name: Install Xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/

      - name: Filter valid links
        run: |
          grep -E '^(vless|vmess|trojan)://' mobile-whitelist-1.txt > working_whitelist.txt || true

      - name: Push to GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git repo

          cp working_whitelist.txt repo/mobile-whitelist-1.txt

          echo "# Updated: $(date -u)" >> repo/mobile-whitelist-1.txt

          cd repo
          git config user.name "GitHub Action Bot"
          git config user.email "bot@noreply.com"

          git add mobile-whitelist-1.txt

          git commit -m "auto update $(date -u)" || echo "no changes"
          git push
