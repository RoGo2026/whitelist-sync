name: Скачивать, проверять и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Скачать источники и создать чистый mobile-whitelist-1.txt
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          if [ ! -f sources.txt ]; then
            echo "Ошибка: файл sources.txt не найден в корне репозитория!" >&2
            exit 1
          fi

          echo "🔄 Обработка источников из sources.txt..."

          while IFS= read -r url || [ -n "$url" ]; do
            if [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]]; then
              continue
            fi
            url=$(echo "$url" | xargs)
            if [[ -n "$url" ]]; then
              filename=$(basename "$url")
              if curl -L -f --fail-early -o "./downloads/$filename" "$url"; then
                grep -v '^[[:space:]]*#' "./downloads/$filename" | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "✅ Добавлено: $url"
              else
                echo "❌ Ошибка скачивания: $url" >&2
              fi
            fi
          done < sources.txt

          # ==============================================================================
          # ФУНКЦИЯ: Умное декодирование подписок (обратная совместимость + новые сервисы)
          # ==============================================================================
          decode_subscription_universal() {
            local url="$1"
            local output_file="$2"
            local temp_raw="./downloads/raw_$$"
            
            # ШАГ 1: Пробуем скачать с обычными заголовками (для старых ссылок)
            if ! curl -L -f --fail-early -s -o "$temp_raw" "$url" 2>/dev/null; then
              echo "❌ Не удалось скачать: $url" >&2
              rm -f "$temp_raw"
              return 1
            fi
            
            # ШАГ 2: Проверяем, не вернули ли нам HTML
            if grep -qE '<!DOCTYPE|<html|<head|<body|<div' "$temp_raw" 2>/dev/null; then
              echo "  → Обнаружен HTML, пробуем заголовки v2ray-приложения..."
              
              if ! curl -L -f --fail-early -s \
                 -H "User-Agent: v2rayN/6.42" \
                 -H "Accept: text/plain, */*" \
                 -H "Profile-Update: 1" \
                 -o "$temp_raw" "$url" 2>/dev/null; then
                 curl -L -f --fail-early -s \
                   -H "User-Agent: ClashMetaForAndroid/2.10.3" \
                   -H "Accept: text/plain" \
                   -o "$temp_raw" "$url" 2>/dev/null || true
              fi
            fi
            
            # ШАГ 3: Извлекаем и чистим контент
            local content
            content=$(cat "$temp_raw" | tr -d '\r\n\t' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | xargs)
            
            if [[ -z "$content" ]]; then
              echo "⚠ Пустой ответ от: $url" >&2
              rm -f "$temp_raw"
              return 1
            fi
            
            # ШАГ 4: Определяем тип и декодируем
            
            # Вариант А: Чистый Base64 (старые ссылки) — пробуем стандартное декодирование
            if [[ "$content" =~ ^[A-Za-z0-9+/=_-]{20,}$ ]] && ! [[ "$content" =~ vmess://|vless://|trojan://|ss://|hysteria:// ]]; then
              if echo "$content" | base64 -d > "$output_file" 2>/dev/null && [[ -s "$output_file" ]]; then
                echo "  → Декодировано стандартным base64"
                rm -f "$temp_raw"
                return 0
              fi
              
              # Универсальный метод (URL-safe + паддинг)
              local decoded
              decoded=$(echo "$content" | tr '_-' '/+' | tr -cd 'A-Za-z0-9+/=' | \
                awk '{ len=length($0)%4; if(len==2)print $0"=="; else if(len==3)print $0"="; else print $0; }' | \
                base64 -d 2>/dev/null)
              
              if [[ -n "$decoded" ]]; then
                echo "$decoded" > "$output_file"
                echo "  → Декодировано универсальным методом (URL-safe Base64)"
                rm -f "$temp_raw"
                return 0
              fi
            fi
            
            # Вариант Б: Уже готовый список ссылок — сохраняем как есть
            if [[ "$content" =~ ^(vmess|vless|trojan|ss|ssr|hysteria|tuic|juicity):// ]]; then
              echo "$content" | tr ' ' '\n' | grep -v '^$' > "$output_file"
              echo "  → Сохранено как готовый список протоколов"
              rm -f "$temp_raw"
              return 0
            fi
            
            # Вариант В: Извлекаем Base64 из смешанного контента
            local cleaned
            cleaned=$(echo "$content" | grep -oE '[A-Za-z0-9+/=_-]{50,}' | head -1)
            if [[ -n "$cleaned" ]]; then
              local decoded
              decoded=$(echo "$cleaned" | tr '_-' '/+' | tr -cd 'A-Za-z0-9+/=' | \
                awk '{ len=length($0)%4; if(len==2)print $0"=="; else if(len==3)print $0"="; else print $0; }' | \
                base64 -d 2>/dev/null)
              
              if [[ -n "$decoded" && "$decoded" =~ (vmess|vless|trojan|ss|ssr|hysteria):// ]]; then
                echo "$decoded" | tr ' ' '\n' | grep -v '^$' > "$output_file"
                echo "  → Извлечено и декодировано из смешанного контента"
                rm -f "$temp_raw"
                return 0
              fi
            fi
            
            echo "⚠ Не удалось распознать формат подписки: $url" >&2
            rm -f "$temp_raw"
            return 1
          }

          # Обработка источников из Base64.txt
          echo "🔄 Обработка источников из Base64.txt..."
          if [ ! -f Base64.txt ]; then
            echo "ℹ️ Файл Base64.txt не найден, пропускаем."
          else
            while IFS= read -r base64_url || [ -n "$base64_url" ]; do
              [[ -z "$base64_url" || "$base64_url" =~ ^[[:space:]]*# ]] && continue
              base64_url=$(echo "$base64_url" | xargs)
              [[ -z "$base64_url" ]] && continue
              
              echo "📥 Обработка: $base64_url"
              
              temp_decoded="./downloads/decoded_$$"
              
              if decode_subscription_universal "$base64_url" "$temp_decoded"; then
                grep -v '^[[:space:]]*#' "$temp_decoded" 2>/dev/null | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "✅ Успешно: $base64_url"
              else
                echo "❌ Пропущено: $base64_url" >&2
              fi
              
              rm -f "$temp_decoded"
            done < Base64.txt
          fi

          # Финальная очистка
          sed -i '/^$/d' mobile-whitelist-1.txt

      - name: Сохранить собранный файл для проверки
        uses: actions/upload-artifact@v4
        with:
          name: raw-whitelist
          path: mobile-whitelist-1.txt

  test-and-filter:
    needs: collect-sources
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать собранный файл
        uses: actions/download-artifact@v4
        with:
          name: raw-whitelist

      - name: Скачать и установить Xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/
          echo "Xray-core установлен: $(xray version | head -n 1)"

      - name: Запустить проверку ссылок через Xray-core
        run: python3 check_links.py

      - name: Обновить файл на GitVerse (только рабочие ссылки)
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo

          if [ -f working_whitelist.txt ]; then
            cp -f working_whitelist.txt ./repo/mobile-whitelist-1.txt
          else
            cp -f mobile-whitelist-1.txt ./repo/mobile-whitelist-1.txt
          fi

          echo "# Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> ./repo/mobile-whitelist-1.txt

          cd ./repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"

          git add mobile-whitelist-1.txt

          if git commit -m "auto update checked whitelist $(date -u +'%Y-%m-%d %H:%M:%S UTC')"; then
            git push
            echo "✅ Файл с проверенными ссылками успешно отправлен на GitVerse"
          else
            echo "ℹ️ Нет изменений после проверки"
          fi
