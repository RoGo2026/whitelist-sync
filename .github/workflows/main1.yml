name: Скачивать, проверять и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Скачать источники и создать чистый mobile-whitelist-1.txt
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt

          if [ ! -f sources.txt ]; then
            echo "Ошибка: файл sources.txt не найден!" >&2
            exit 1
          fi

          echo "Обработка обычных источников..."

          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
            url=$(echo "$url" | xargs)

            filename="src_$(date +%s%N)_$RANDOM.tmp"

            if curl -L -f --fail-early \
              --connect-timeout 10 --max-time 20 \
              --user-agent "Mozilla/5.0" \
              -o "./downloads/$filename" "$url"; then

              grep -v '^[[:space:]]*#' "./downloads/$filename" \
                | sed '/^$/d' >> mobile-whitelist-1.txt

              echo "Добавлено: $url"
            else
              echo "Ошибка скачивания: $url" >&2
            fi

            rm -f "./downloads/$filename"
          done < sources.txt


          echo "Обработка Base64 источников..."

          if [ -f Base64.txt ]; then
            while IFS= read -r base64_url || [ -n "$base64_url" ]; do
              [[ -z "$base64_url" || "$base64_url" =~ ^[[:space:]]*# ]] && continue
              base64_url=$(echo "$base64_url" | xargs)

              b64_file="./downloads/b64_$(date +%s%N)_$RANDOM.tmp"

              echo "Скачивание Base64: $base64_url"

              if curl -L -f --fail-early \
                --connect-timeout 10 --max-time 20 \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
                -o "$b64_file" "$base64_url"; then

                # Проверка что это похоже на base64 VLESS
                if grep -q "dmxlc3M" "$b64_file"; then

                  # Убираем переносы → декодируем → чистим
                  cat "$b64_file" \
                    | tr -d '\r\n' \
                    | base64 -d 2>/dev/null \
                    | grep -v '^[[:space:]]*#' \
                    | sed '/^$/d' >> mobile-whitelist-1.txt

                  echo "Base64 успешно декодирован: $base64_url"

                else
                  echo "⚠ Не похоже на Base64/VLESS: $base64_url"
                fi

              else
                echo "Ошибка скачивания Base64: $base64_url" >&2
              fi

              rm -f "$b64_file"

            done < Base64.txt
          else
            echo "Base64.txt не найден — пропуск"
          fi


          # Финальная очистка + удаление дублей
          sed -i '/^$/d' mobile-whitelist-1.txt
          sort -u mobile-whitelist-1.txt -o mobile-whitelist-1.txt

      - name: Сохранить собранный файл
        uses: actions/upload-artifact@v4
        with:
          name: raw-whitelist
          path: mobile-whitelist-1.txt


  test-and-filter:
    needs: collect-sources
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать собранный файл
        uses: actions/download-artifact@v4
        with:
          name: raw-whitelist

      - name: Установить Xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/
          echo "Xray: $(xray version | head -n 1)"

      - name: Проверка ссылок
        run: python3 check_links.py

      - name: Обновить GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git repo

          if [ -f working_whitelist.txt ]; then
            cp -f working_whitelist.txt repo/mobile-whitelist-1.txt
          else
            cp -f mobile-whitelist-1.txt repo/mobile-whitelist-1.txt
          fi

          echo "# Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> repo/mobile-whitelist-1.txt

          cd repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"

          git add mobile-whitelist-1.txt

          if git commit -m "auto update $(date -u +'%Y-%m-%d %H:%M:%S UTC')"; then
            git push
            echo "✅ Обновлено"
          else
            echo "Нет изменений"
          fi
