name: Скачивать mobile-whitelist-1.txt каждые 5 минут на GitVerse

# Force re-register schedule - test 05 (28.03.2026) 

on:
  schedule:
  - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  download-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать файл с GitHub
        run: |
          mkdir -p ./download
          curl -L -f --fail-early -o ./download/mobile-whitelist-1.txt \
            "https://raw.githubusercontent.com/mmaksim9191/my-vpn-configs/main/configs/mobile-whitelist-1.txt"
          echo "✅ Файл скачан с GitHub"

      - name: Клонировать репозиторий GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo
          echo "✅ Репозиторий клонирован"

      - name: Принудительно обновить файл
        working-directory: ./repo
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"
          
          cp -f ../download/mobile-whitelist-1.txt mobile-whitelist-1.txt
          
          # Принудительное изменение содержимого
          echo "# Last updated by GitHub Action: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> mobile-whitelist-1.txt
          
          git add mobile-whitelist-1.txt
          
          git commit -m "Автообновление: mobile-whitelist-1.txt ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" --allow-empty
          
          git push origin HEAD:master && echo "✅ Успешно обновлено на GitVerse" || echo "❌ Ошибка push"
