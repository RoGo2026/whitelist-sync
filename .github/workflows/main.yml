name: Fetch UWB Configs (Whitelist Bypass)

on:
  schedule:
    - cron: '0 */2 * * *'     # каждые 2 часа (можно изменить)
  workflow_dispatch:          # можно запускать вручную

jobs:
  fetch-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright

      - name: Run automation script
        run: node fetch-configs.js

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add uwb-configs.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update UWB configs $(date +'%Y-%m-%d %H:%M:%S EEST')"
            git push
          fi
