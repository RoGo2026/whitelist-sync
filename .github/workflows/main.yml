name: Скачивать и объединять mobile-whitelist-1.txt на GitVerse (только чистые ссылки)

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

jobs:
  download-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Скачать источники и создать чистый mobile-whitelist-1.txt (без комментариев)
        run: |
          mkdir -p ./downloads

          # Создаём чистый файл только с ссылками
          > mobile-whitelist-1.txt

          if [ ! -f sources.txt ]; then
            echo "Ошибка: файл sources.txt не найден в корне репозитория на GitHub!" >&2
            exit 1
          fi

          while IFS= read -r url || [ -n "$url" ]; do
            # Пропускаем пустые строки и комментарии в sources.txt
            if [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]]; then
              continue
            fi

            url=$(echo "$url" | xargs)

            if [[ -n "$url" ]]; then
              filename=$(basename "$url")
              if curl -L -f --fail-early -o "./downloads/$filename" "$url"; then
                # Добавляем только чистые ссылки (убираем строки с #)
                grep -v '^[[:space:]]*#' "./downloads/$filename" | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "Успешно добавлено (очищено): $url"
              else
                echo "Ошибка скачивания: $url" >&2
              fi
            fi
          done < sources.txt

          # Финальная очистка пустых строк
          sed -i '/^$/d' mobile-whitelist-1.txt

      - name: Клонировать GitVerse репозиторий
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo

      - name: Обновить файл на GitVerse (всегда с новым временем)
        working-directory: ./repo
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"
          
          cp -f ../mobile-whitelist-1.txt mobile-whitelist-1.txt
          
          # Добавляем строку с текущим временем в конец файла, чтобы коммит всегда проходил
          echo "# Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> mobile-whitelist-1.txt
          
          git add mobile-whitelist-1.txt
          
          # Всегда пытаемся сделать коммит (даже если основное содержимое не изменилось)
          if git commit -m "auto update clean whitelist $(date -u +'%Y-%m-%d %H:%M:%S UTC')"; then
            git push
            echo "Изменения успешно отправлены на GitVerse"
          else
            echo "Нет изменений в файле (кроме строки времени)"
          fi
