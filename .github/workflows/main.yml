name: Fetch UWB Configs → GitVerse (mobile-whitelist-1.txt)

on:
  schedule:
    - cron: '0 */1 * * *'     # каждые 60 минут (можно вернуть */2)
  workflow_dispatch:

jobs:
  fetch-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run automation script
        run: node fetch-configs.js

      - name: Commit and push to GitVerse
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          echo "=== Git status before ==="
          git status
          
          git add -f mobile-whitelist-1.txt   # -f = force add
          
          echo "=== Git diff after add ==="
          git diff --cached --stat
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update mobile-whitelist-1.txt from UWB site $(date +'%Y-%m-%d %H:%M:%S EEST')"
            git push
            echo "✅ Successfully pushed to GitVerse"
          fi
