name: Ссылки из чекеров

on:
  schedule:
    - cron: '0 */1 * * *'     # каждые 60 минут
  workflow_dispatch:

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm'   ← убрали, чтобы избежать ошибки

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright
          npm install   # создаёт package-lock.json

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v2
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright Browsers (только если нет в кэше)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Запуск скачивания конфигов с сайта
        run: node fetch-configs.js

      - name: Отправка файла на GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./gitverse-repo
          
          cp -f mobile-whitelist-1.txt ./gitverse-repo/mobile-whitelist-1.txt
          
          echo "# Last updated: $(date +'%Y-%m-%d %H:%M:%S EEST')" >> ./gitverse-repo/mobile-whitelist-1.txt
          
          cd ./gitverse-repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"
          
          git add mobile-whitelist-1.txt
          
          if git commit -m "Update mobile-whitelist-1.txt from UWB site $(date +'%Y-%m-%d %H:%M:%S EEST')"; then
            git push
            echo "✅ Файл успешно отправлен на GitVerse"
          else
            echo "Нет изменений"
          fi
