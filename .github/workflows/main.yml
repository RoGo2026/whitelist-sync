name: Скачивать mobile-whitelist-1.txt каждый час на GitVerse

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  download-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать файл с GitHub
        run: |
          mkdir -p ./repo
          curl -L -f -o ./repo/mobile-whitelist-1.txt \
            https://raw.githubusercontent.com/mmaksim9191/my-vpn-configs/main/configs/mobile-whitelist-1.txt

      - name: Checkout репозитория на GitVerse
        uses: actions/checkout@v4
        with:
          repository: RoGo/mobile-whitelist          # ← ИЗМЕНИТЕ НА ТОЧНОЕ НАЗВАНИЕ ВАШЕГО РЕПОЗИТОРИЯ НА GITVERSE
          token: ${{ secrets.WHITELIST_TOKEN }}
          path: ./repo
          ref: main

      - name: Загрузить файл на GitVerse
        working-directory: ./repo
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"
          
          git add mobile-whitelist-1.txt
          
          if git diff --staged --quiet; then
            echo "Файл не изменился — обновление не требуется."
          else
            git commit -m "Автообновление: mobile-whitelist-1.txt ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
            git push origin HEAD:master
            echo "Файл успешно обновлён на GitVerse."
          fi
