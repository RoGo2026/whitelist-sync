name: Скачивать, проверять и обновлять mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать источники
        run: |
          mkdir -p ./downloads
          > mobile-whitelist-1.txt
          
          echo "=== ПРОВЕРКА ФАЙЛОВ ==="
          ls -la
          echo ""
          
          # ─── Обработка sources.txt ───
          if [ -f sources.txt ]; then
            echo "✅ Файл sources.txt найден"
            echo "Содержимое sources.txt:"
            cat sources.txt
            echo ""
            
            while IFS= read -r url || [ -n "$url" ]; do
              [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue
              url=$(echo "$url" | xargs)
              [[ -z "$url" ]] && continue
              filename=$(basename "$url")
              echo "📥 Скачиваю: $url"
              if curl -L -f -s -o "./downloads/$filename" "$url"; then
                grep -v '^[[:space:]]*#' "./downloads/$filename" | sed '/^$/d' >> mobile-whitelist-1.txt
                echo "  ✅ Добавлено в список"
              else
                echo "  ❌ Ошибка скачивания"
              fi
            done < sources.txt
          else
            echo "⚠️ Файл sources.txt не найден"
          fi
          echo ""

          # ─── Обработка Base64.txt (ссылки, возвращающие Base64 с данными) ───
          if [ -f "Base64.txt" ]; then
            echo "✅ Файл Base64.txt найден"
            echo "Содержимое Base64.txt:"
            cat Base64.txt
            echo ""
            
            counter=1
            while IFS= read -r b64_url || [ -n "$b64_url" ]; do
              [[ -z "$b64_url" || "$b64_url" =~ ^[[:space:]]*# ]] && continue
              b64_url=$(echo "$b64_url" | xargs)
              [[ -z "$b64_url" ]] && continue
              
              echo "📥 Обработка ссылки #$counter: $b64_url"
              
              # Скачиваем содержимое (оно в формате Base64)
              if curl -L -f -s -o "./downloads/b64_raw_$counter.txt" "$b64_url"; then
                echo "  ✅ Файл скачан, размер: $(wc -c < "./downloads/b64_raw_$counter.txt") байт"
                echo "  📄 Первые 100 символов:"
                head -c 100 "./downloads/b64_raw_$counter.txt"
                echo ""
                
                # Декодируем Base64 → получаем чистые строки (VLESS-ссылки)
                if base64 -d "./downloads/b64_raw_$counter.txt" > "./downloads/decoded_$counter.txt" 2>/dev/null; then
                  echo "  ✅ Base64 декодирован успешно"
                  echo "  📄 Декодированное содержимое (первые 5 строк):"
                  head -5 "./downloads/decoded_$counter.txt"
                  
                  # Извлекаем только полезные строки
                  grep -v '^[[:space:]]*#' "./downloads/decoded_$counter.txt" 2>/dev/null | sed '/^$/d' >> mobile-whitelist-1.txt
                  echo "  ✅ Добавлено в mobile-whitelist-1.txt"
                else
                  echo "  ⚠️ Стандартное декодирование не сработало, пробую режим совместимости..."
                  if cat "./downloads/b64_raw_$counter.txt" | tr -d '\r\n\t ' | base64 -d > "./downloads/decoded_$counter.txt" 2>/dev/null; then
                    echo "  ✅ Декодировано в режиме совместимости"
                    grep -v '^[[:space:]]*#' "./downloads/decoded_$counter.txt" 2>/dev/null | sed '/^$/d' >> mobile-whitelist-1.txt
                  else
                    echo "  ❌ Ошибка декодирования"
                  fi
                fi
              else
                echo "  ❌ Не удалось скачать файл"
              fi
              ((counter++))
            done < Base64.txt
            echo "✅ Обработано ссылок из Base64.txt: $((counter-1))"
          else
            echo "⚠️ Файл Base64.txt не найден"
          fi
          echo ""

          # Финальная статистика
          echo "=== ИТОГОВАЯ СТАТИСТИКА ==="
          if [ -f mobile-whitelist-1.txt ]; then
            lines=$(wc -l < mobile-whitelist-1.txt)
            echo "📊 Строк в mobile-whitelist-1.txt: $lines"
            if [ "$lines" -gt 0 ]; then
              echo "📄 Первые 5 строк:"
              head -5 mobile-whitelist-1.txt
            fi
            sort -u mobile-whitelist-1.txt -o mobile-whitelist-1.txt
            sed -i '/^$/d' mobile-whitelist-1.txt
            echo "✅ Файл очищен от дубликатов и пустых строк"
          else
            echo "❌ Файл mobile-whitelist-1.txt не создан"
          fi

      - name: Сохранить файл
        uses: actions/upload-artifact@v4
        with:
          name: raw-whitelist
          path: mobile-whitelist-1.txt

  test-and-filter:
    needs: collect-sources
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать файл
        uses: actions/download-artifact@v4
        with:
          name: raw-whitelist

      - name: Показать содержимое файла
        run: |
          echo "=== СОДЕРЖИМОЕ mobile-whitelist-1.txt ==="
          if [ -f mobile-whitelist-1.txt ]; then
            lines=$(wc -l < mobile-whitelist-1.txt)
            echo "Всего строк: $lines"
            if [ "$lines" -gt 0 ]; then
              head -20 mobile-whitelist-1.txt
            else
              echo "⚠️ Файл пустой!"
            fi
          else
            echo "❌ Файл не найден"
          fi

      - name: Установить Xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/

      - name: Проверка ссылок
        run: python3 check_links.py

      - name: Обновить GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo 2>/dev/null || true
          if [ -f working_whitelist.txt ] && [ -s working_whitelist.txt ]; then
            cp -f working_whitelist.txt ./repo/mobile-whitelist-1.txt
            echo "# Updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> ./repo/mobile-whitelist-1.txt
            cd ./repo
            git config user.name "GitHub Action Bot"
            git config user.email "action@noreply.github.com"
            git add mobile-whitelist-1.txt
            git commit -m "auto update $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push && echo "Pushed" || echo "No changes"
          else
            echo "Empty result, skip push"
          fi
