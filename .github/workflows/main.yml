name: Скачивать mobile-whitelist-1.txt каждый час на GitVerse

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  download-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать актуальный файл с GitVerse (raw API)
        run: |
          mkdir -p ./download
          curl -L -f --fail-early -o ./download/mobile-whitelist-1.txt \
            "https://gitverse.ru/api/repos/RoGo/mobile-whitelist/raw/branch/master/mobile-whitelist-1.txt"
          
          if [ ! -s ./download/mobile-whitelist-1.txt ]; then
            echo "Ошибка: файл не скачан или пустой."
            exit 1
          fi
          echo "Файл успешно скачан с GitVerse через API."

      - name: Клонировать репозиторий GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo
          echo "Репозиторий успешно клонирован."

      - name: Обновить файл и отправить изменения
        working-directory: ./repo
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"
          
          cp ../download/mobile-whitelist-1.txt mobile-whitelist-1.txt
          
          git add mobile-whitelist-1.txt
          
          if git diff --staged --quiet; then
            echo "Файл не изменился — обновление не требуется."
          else
            git commit -m "Автообновление: mobile-whitelist-1.txt ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
            git push origin HEAD:master
            echo "Файл успешно обновлён на GitVerse (ветка master)."
          fi
