name: Fetch UWB Configs → GitVerse (mobile-whitelist-1.txt)

on:
  schedule:
    - cron: '0 */2 * * *'     # каждые 2 часа
  workflow_dispatch:

jobs:
  fetch-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run automation script
        run: node fetch-configs.js

      - name: Commit and push to GitVerse
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          if [ -f mobile-whitelist-1.txt ]; then
            git add mobile-whitelist-1.txt
            if git diff --cached --quiet; then
              echo "No changes detected"
            else
              git commit -m "Update mobile-whitelist-1.txt from UWB site $(date +'%Y-%m-%d %H:%M:%S EEST')"
              git push
            fi
          else
            echo "Target file not found"
            exit 1
          fi
