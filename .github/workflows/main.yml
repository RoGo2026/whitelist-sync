name: Скачивать mobile-whitelist-1.txt каждые 5 минут на GitVerse (принудительно)

on:
  schedule:
    - cron: '*/5 * * * *'     # каждые 5 минут
  workflow_dispatch:

jobs:
  download-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать актуальный файл с GitHub
        run: |
          mkdir -p ./download
          curl -L -f --fail-early -o ./download/mobile-whitelist-1.txt \
            "https://raw.githubusercontent.com/mmaksim9191/my-vpn-configs/main/configs/mobile-whitelist-1.txt"
          
          echo "✅ Файл скачан с GitHub"
          echo "Размер: $(wc -c < ./download/mobile-whitelist-1.txt) байт"

      - name: Клонировать репозиторий GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo
          echo "✅ Репозиторий GitVerse успешно клонирован"

      - name: Принудительно обновить файл на GitVerse
        working-directory: ./repo
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"
          
          # Копируем файл
          cp ../download/mobile-whitelist-1.txt mobile-whitelist-1.txt
          
          # Принудительно добавляем и коммитим (даже если файл не изменился)
          git add mobile-whitelist-1.txt
          
          git commit -m "Автообновление: mobile-whitelist-1.txt ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" --allow-empty
          
          git push origin HEAD:master
          
          echo "✅ Файл принудительно обновлён на GitVerse (ветка master)"
