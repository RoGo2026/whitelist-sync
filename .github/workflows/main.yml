name: Скачивать mobile-whitelist-1.txt на GitVerse

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

jobs:
  download-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать файлы с источников
        run: |
          mkdir -p ./download
          
          # Список URL для скачивания (3 источника)
          urls=(
            "https://raw.githubusercontent.com/mmaksim9191/my-vpn-configs/main/configs/mobile-whitelist-1.txt"
            "https://raw.githubusercontent.com/Maskkost93/kizyak-vpn-4.0/refs/heads/main/kizyaktestru.txt"
            "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt"
          )
          
          # Скачиваем каждый файл
          for url in "${urls[@]}"; do
            filename=$(basename "$url")
            curl -L -f --fail-early -o "./download/$filename" "$url"
            echo "Скачан: $filename"
          done

      - name: Объединить и отфильтровать файлы
        run: |
          # Создаём пустой временный файл
          > ./download/combined_temp.txt
          
          # Последовательно добавляем содержимое всех скачанных .txt файлов
          for file in ./download/*.txt; do
            if [[ "$file" != "./download/combined_temp.txt" && "$file" != "./download/mobile-whitelist-1.txt" ]]; then
              cat "$file" >> ./download/combined_temp.txt
            fi
          done
          
          # Фильтруем: удаляем все строки, начинающиеся с # (комментарии, метаданные)
          # Оставляем только рабочие ссылки с любыми протоколами
          grep -v '^#' ./download/combined_temp.txt > ./download/mobile-whitelist-1.txt || true
          grep -v '^$' ./download/mobile-whitelist-1.txt > ./download/mobile-whitelist-1.tmp && mv ./download/mobile-whitelist-1.tmp ./download/mobile-whitelist-1.txt
          
          # Удаляем временный файл
          rm -f ./download/combined_temp.txt
          
          echo "✅ Удалены комментарии, оставлены только рабочие ссылки"

      - name: Клонировать GitVerse
        run: |
          git clone https://RoGo:${{ secrets.WHITELIST_TOKEN }}@gitverse.ru/RoGo/mobile-whitelist.git ./repo

      - name: Обновить файл
        working-directory: ./repo
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@noreply.github.com"

          cp -f ../download/mobile-whitelist-1.txt mobile-whitelist-1.txt

          echo "# Updated $(date -u)" >> mobile-whitelist-1.txt

          git add mobile-whitelist-1.txt
          git commit -m "auto update $(date -u)" || echo "Нет изменений"
          git push

      - name: Принудительно активировать расписание
        run: |
          echo "re-activate schedule $(date)" >> force.txt
